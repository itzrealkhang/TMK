<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TMK API Docs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
  font-family: 'Poppins', sans-serif;
  background: #f4f6fb;
  margin:0;
  padding:40px;
  color:#222;
  transition:0.3s;
}

.dark{
  background:#0f172a;
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.dark .container{
  background:#1e293b;
}

h1{
  font-size:32px;
  font-weight:600;
}

/* 🌈 chữ 7 màu */
.rainbow{
  background: linear-gradient(
    90deg,
    red, orange, yellow, green, cyan, blue, violet
  );
  -webkit-background-clip: text;
  color: transparent;
  animation: move 5s linear infinite;
}

@keyframes move{
  0%{background-position:0%}
  100%{background-position:200%}
}

pre{
  background:#0f172a;
  color:#0ef;
  padding:15px;
  border-radius:10px;
  overflow:auto;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  font-weight:600;
}

.copy{
  background:#6366f1;
  color:white;
}

.test{
  background:#10b981;
  color:white;
}

.toggle{
  float:right;
  background:#111;
  color:white;
}

.dark .toggle{
  background:white;
  color:black;
}

.footer{
  margin-top:30px;
  opacity:0.6;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<button class="toggle" onclick="toggleMode()">Dark Mode</button>

<h1 class="rainbow">TMK API</h1>

<p>
Trang web API nơi để có được API font chữ 7 màu nhạt nối lại với nhau 🌈
</p>

<h2>📌 Endpoint</h2>

<pre id="endpoint"></pre>

<button class="copy" onclick="copy()">Copy</button>
<a id="testBtn" target="_blank">
  <button class="test">Test API</button>
</a>

<div class="footer">
© 2026 TMK API — Powered by Node.js
</div>

</div>

<script>

const apiUrl = window.location.origin + "/gai";

document.getElementById("endpoint").innerText = apiUrl;
document.getElementById("testBtn").href = apiUrl;

function copy(){
  navigator.clipboard.writeText(apiUrl);
  alert("Đã copy: " + apiUrl);
}

function toggleMode(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
